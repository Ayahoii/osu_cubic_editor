<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSU Cubic Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== PROJECTS SCREEN ===== -->
<div id="screen-projects" class="screen">
  <div class="projects-wrapper">
    <img src="image/logo.png" alt="OSU Cubic" class="main-logo" onerror="this.style.display='none'">
    <p class="subtitle">Mapping Editor</p>
    <div id="project-list"></div>
    <div style="display:flex;gap:8px;width:100%">
      <button class="btn btn-primary" id="btn-new-project" style="flex:1">+ New Project</button>
      <button class="btn btn-accent" id="btn-import-project" style="flex:1">📥 Import JS</button>
    </div>
  </div>
</div>

<input type="file" id="file-import-project" accept=".js" style="display:none">

<!-- ===== EDITOR SCREEN ===== -->
<div id="screen-editor" class="screen hidden">

  <header id="editor-header">
    <img src="image/logo.png" alt="" class="editor-logo" onerror="this.style.display='none'">
    <img id="music-icon-img" class="music-icon-header" style="display:none" alt="">
    <div class="header-center">
      <span id="header-project-name" class="project-name"></span>
      <select id="difficulty-select">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
        <option value="expert">Expert</option>
        <option value="master">Master</option>
      </select>
      <span id="note-count-badge" class="badge">0 notes</span>
    </div>
    <div class="header-actions">
      <button class="btn" id="btn-load-audio">🎵 Audio</button>
      <button class="btn" id="btn-import">📥 Import</button>
      <button class="btn btn-success" id="btn-save">💾 Save</button>
      <button class="btn btn-accent" id="btn-export">📤 Export JS</button>
      <button class="btn btn-danger" id="btn-back">← Back</button>
    </div>
  </header>

  <div id="editor-body">

    <!-- Block Grid -->
    <div id="grid-panel">
      <div class="panel-bar">
        <span class="panel-title">Note Grid</span>
        <span id="grid-tick-display" class="tick-info">Tick: 0 | 0.00s</span>
      </div>
      <div id="block-grid-wrap">
        <div id="block-grid"></div>
      </div>
      <div id="grid-footer">
        <span id="audio-status">No audio — click 🎵 Audio to load</span>
        <label class="grid-preview-toggle">
          <input id="toggle-grid-preview" type="checkbox">
          <span>Minecraft Preview</span>
        </label>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline-panel">
      <div class="panel-bar">
        <span class="panel-title">Timeline</span>
        <span id="timeline-diff-label" class="badge"></span>
        <span class="hint">Click: select/seek | Scroll: navigate | Del: delete</span>
      </div>
      <div id="timeline-wrap">
        <canvas id="timeline-canvas"></canvas>
      </div>
    </div>

    <!-- Note Info + Metadata -->
    <div id="info-panel">
      <!-- Tabs -->
      <div class="info-tabs">
        <button class="info-tab active" id="tab-note" onclick="switchInfoTab('note')">🎵 Note</button>
        <button class="info-tab" id="tab-meta" onclick="switchInfoTab('meta')">📋 Metadata</button>
      </div>

      <!-- NOTE TAB -->
      <div id="tab-note-content">
        <div id="note-props-empty">
          <p class="muted">Click a note on the<br>timeline or grid</p>
        </div>
        <div id="note-props-form" class="hidden">
          <div class="prop-group">
            <label>Tick</label>
            <input id="prop-tick" type="number" class="prop-input" readonly>
          </div>
          <div class="prop-row2">
            <div class="prop-group">
              <label>X</label>
              <input id="prop-x" type="number" class="prop-input" readonly>
            </div>
            <div class="prop-group">
              <label>Z</label>
              <input id="prop-z" type="number" class="prop-input" readonly>
            </div>
          </div>
          <div class="prop-group">
            <label>Type</label>
            <input id="prop-type" type="text" class="prop-input" placeholder="normal">
          </div>
          <div class="prop-group">
            <label>Sound</label>
            <input id="prop-sound" type="text" class="prop-input" placeholder="">
          </div>
          <div class="prop-group">
            <label>Event</label>
            <input id="prop-event" type="text" class="prop-input" placeholder="">
          </div>
          <div class="prop-group">
            <label>Lyric</label>
            <input id="prop-lyric" type="text" class="prop-input" placeholder="">
          </div>
          <button class="btn btn-sm btn-success full-w" id="btn-apply-props">✓ Apply</button>
          <button class="btn btn-sm btn-danger full-w" id="btn-delete-note">🗑 Delete (Del)</button>
        </div>
      </div>

      <!-- METADATA TAB -->
      <div id="tab-meta-content" class="hidden">
        <div id="meta-form">
          <div class="prop-group">
            <label>Title</label>
            <input id="meta-name" type="text" class="prop-input" placeholder="Song name">
          </div>
          <div class="prop-group">
            <label>Artist</label>
            <input id="meta-artist" type="text" class="prop-input" placeholder="">
          </div>
          <div class="prop-group">
            <label>Minecraft Icon</label>
            <input id="meta-icon" type="text" class="prop-input" placeholder="textures/music_icons/name.png">
          </div>
          <div class="prop-group">
            <label>Cover Image (local)</label>
            <div style="display:flex;gap:4px">
              <div id="meta-icon-preview" class="icon-preview"></div>
              <button class="btn btn-sm" id="btn-load-icon" style="flex:1">📁 Load</button>
            </div>
          </div>
          <div class="prop-group">
            <label>Block (blockplace)</label>
            <input id="meta-blockplace" type="text" class="prop-input" placeholder="minecraft:red_wool">
          </div>
          <div class="prop-group">
            <label>Duration (s)</label>
            <div style="display:flex;gap:4px">
              <input id="meta-duration" type="number" class="prop-input" min="1" style="flex:1">
              <button class="btn btn-sm btn-accent" id="btn-duration-from-audio" title="Use loaded audio duration">🎵</button>
            </div>
          </div>
          <div class="prop-group">
            <label>Minecraft Audio ID</label>
            <input id="meta-audio-id" type="text" class="prop-input" placeholder="osu_cubic.name">
          </div>
          <div class="prop-group">
            <label>Minecraft Preview ID</label>
            <input id="meta-preview-id" type="text" class="prop-input" placeholder="osu_cubic.name.preview">
          </div>
          <button class="btn btn-sm btn-success full-w" id="btn-apply-meta">✓ Save Metadata</button>
        </div>
      </div>
    </div>

  </div><!-- end editor-body -->

  <!-- Playback Bar -->
  <footer id="playback-bar">
    <button class="ctrl-btn" id="btn-rewind" title="Restart">⏮</button>
    <button class="ctrl-btn play-btn" id="btn-play-pause" title="Play/Pause (Space)">▶</button>
    <div id="seekbar-wrap">
      <div id="seekbar-track">
        <div id="seekbar-fill"></div>
        <div id="seekbar-thumb"></div>
      </div>
    </div>
    <span id="time-display">0:00.000 / 0:00.000</span>
    <label class="zoom-label">Zoom
      <input type="range" id="zoom-slider" min="20" max="600" value="80">
    </label>
  </footer>

</div><!-- end screen-editor -->

<!-- ===== MODAL: New Project ===== -->
<div id="modal-new-project" class="modal hidden">
  <div class="modal-bg" id="modal-np-bg"></div>
  <div class="modal-box">
    <h2>New Project</h2>
    <div class="form-grid">
      <div class="form-field full">
        <label>Song Name *</label>
        <input type="text" id="np-name" placeholder="e.g. Circus FNAF">
      </div>
      <div class="form-field">
        <label>Artist</label>
        <input type="text" id="np-artist" placeholder="e.g. Living Tombstone">
      </div>
      <div class="form-field">
        <label>Icon (texture)</label>
        <input type="text" id="np-icon" placeholder="textures/music_icons/song.png">
      </div>
      <div class="form-field">
        <label>Minecraft Audio ID</label>
        <input type="text" id="np-audio-id" placeholder="osu_cubic.song_name">
      </div>
      <div class="form-field">
        <label>Minecraft Preview ID</label>
        <input type="text" id="np-preview-id" placeholder="osu_cubic.song_name.preview">
      </div>
      <div class="form-field">
        <label>Duration (seconds) *</label>
        <input type="number" id="np-duration" value="120" min="1">
      </div>
      <div class="form-field full">
        <label>Block to place</label>
        <input type="text" id="np-blockplace" value="minecraft:red_wool">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="btn-create-project">Create Project</button>
      <button class="btn" id="btn-cancel-new">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Hidden inputs -->
<input type="file" id="file-audio" accept=".ogg,.mp3,.wav,.flac,.m4a" style="display:none">
<input type="file" id="file-import" accept=".js,.json" style="display:none">
<input type="file" id="file-icon-img" accept="image/*" style="display:none">

<script src="app.js"></script>
</body>
</html>
